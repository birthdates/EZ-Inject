name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Stage release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $rawExe = "src-tauri\target\release\ezinject.exe"
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $msiDir = "src-tauri\target\release\bundle\msi"

          if (!(Test-Path -LiteralPath $rawExe)) {
            throw "Raw executable was not found at $rawExe"
          }

          if (!(Test-Path -LiteralPath $nsisDir)) {
            throw "NSIS bundle directory was not found at $nsisDir"
          }

          if (!(Test-Path -LiteralPath $msiDir)) {
            throw "MSI bundle directory was not found at $msiDir"
          }

          $setupExe = Get-ChildItem -Path $nsisDir -Filter "*.exe" | Select-Object -First 1
          $msi = Get-ChildItem -Path $msiDir -Filter "*.msi" | Select-Object -First 1

          if ($null -eq $setupExe) {
            throw "NSIS setup executable was not found."
          }

          if ($null -eq $msi) {
            throw "MSI installer was not found."
          }

          Copy-Item -LiteralPath $rawExe -Destination "release-assets\EZInject.exe" -Force
          Copy-Item -LiteralPath $setupExe.FullName -Destination "release-assets\EZInject-setup.exe" -Force
          Copy-Item -LiteralPath $msi.FullName -Destination "release-assets\EZInject.msi" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZInject-windows
          path: release-assets/*

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "master-$shortSha"
          $title = "EZInject $shortSha"
          $notes = "Automated Windows build for commit $env:GITHUB_SHA on master."

          gh release view $tag *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag release-assets/* --clobber
          } else {
            gh release create $tag release-assets/* --target $env:GITHUB_SHA --title $title --notes $notes
          }